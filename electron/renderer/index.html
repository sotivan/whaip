<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>WHAIP</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ── Top bar ──────────────────────────────────────────────────── -->
  <header id="topbar">
    <div id="nav-controls">
      <button id="btn-back"    title="Back">&#8592;</button>
      <button id="btn-forward" title="Forward">&#8594;</button>
      <button id="btn-reload"  title="Reload">&#8635;</button>
    </div>

    <div id="address-bar-wrap">
      <input id="address-bar" type="url" placeholder="Search or enter address…" />
    </div>

    <div id="topbar-actions">
      <!-- Mic -->
      <button id="btn-mic-toggle" title="Activar / pausar micrófono">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="17" x2="12" y2="22"/>
          <line x1="8" y1="22" x2="16" y2="22"/>
        </svg>
      </button>
      <!-- Bookmark -->
      <button id="btn-bookmark" title="Guardar marcador (Cmd+D)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
          <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>
        </svg>
      </button>
      <!-- AI sidebar / chat -->
      <button id="btn-sidebar-toggle" title="Toggle AI sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Tabs bar -->
  <div id="tabs-bar">
    <div id="tabs-list"></div>
    <button id="btn-new-tab" title="Nueva pestaña (Cmd+T)">+</button>
  </div>

  <!-- Bookmarks bar -->
  <div id="bookmarks-bar">
    <div id="bookmarks-list"></div>
  </div>

  <!-- ── Main layout ──────────────────────────────────────────────── -->
  <main id="layout">

    <!-- ── Start screen — covers full layout (browser + sidebar) ─────── -->
    <div id="start-screen">
        <!-- Settings (3 dots) -->
        <button id="start-settings-btn" title="Configuración">
          <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
            <circle cx="5" cy="12" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="19" cy="12" r="1.8"/>
          </svg>
        </button>
        <div id="start-settings-panel" class="ss-hidden">
          <div class="ss-panel-title">Apariencia</div>
          <label class="ss-setting-row">
            <span>Tema oscuro</span>
            <label class="ss-toggle"><input type="checkbox" id="theme-toggle" checked><span class="ss-slider"></span></label>
          </label>
        </div>

        <!-- Center content -->
        <div id="start-content">
          <p id="start-greeting">¿Qué hacemos hoy<span id="start-name"></span>?</p>

          <div id="start-mic-wrap">
            <span class="ss-ring ss-ring-3"></span>
            <span class="ss-ring ss-ring-2"></span>
            <span class="ss-ring ss-ring-1"></span>
            <button id="start-mic-btn" aria-label="Comenzar sesión">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="34" height="34">
                <rect x="9" y="2" width="6" height="12" rx="3"/>
                <path d="M5 10a7 7 0 0 0 14 0"/>
                <line x1="12" y1="17" x2="12" y2="22"/>
                <line x1="8" y1="22" x2="16" y2="22"/>
              </svg>
            </button>
          </div>

          <span id="start-hint">Pulsa para comenzar</span>
        </div>
      </div>

    <!-- Embedded browser -->
    <section id="browser-pane">
      <webview id="webview"
               src="about:blank"
               allowpopups
               webpreferences="contextIsolation=yes"></webview>

      <!-- Hand cursor overlay -->
      <canvas id="hand-overlay"></canvas>

      <!-- AI agent cursor — shows where the agent is clicking -->
      <div id="ai-cursor" style="
        display:none;
        position:absolute;
        width:28px; height:28px;
        pointer-events:none;
        z-index:9999;
        transition: left 0.25s cubic-bezier(.4,0,.2,1), top 0.25s cubic-bezier(.4,0,.2,1);
        transform: translate(-4px, -4px);
      ">
        <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="14" cy="14" r="13" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-width="1.5"/>
          <circle cx="14" cy="14" r="4" fill="#6366f1"/>
          <circle id="ai-cursor-pulse" cx="14" cy="14" r="10" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0"/>
        </svg>
      </div>
    </section>

    <!-- AI sidebar -->
    <aside id="sidebar" class="sidebar-hidden">
      <div id="sidebar-header">
        <span>WHAIP Agent</span>
        <button id="btn-sidebar-close">&#x2715;</button>
      </div>

      <div id="agent-status">
        <span id="status-indicator" class="status-idle"></span>
        <span id="status-label">Idle</span>
      </div>

      <div style="padding:6px 16px 0;font-size:11px;">
        <span id="agent-conn-badge" style="color:#71717a;">○ Agente desconectado</span>
      </div>

      <div id="transcript-feed"></div>

      <div id="sidebar-footer">
        <span id="mic-status-text" style="font-size:12px;color:var(--color-muted)">Micrófono inactivo — pulsa Activar</span>
      </div>
    </aside>
  </main>

  <script src="tabs.js"></script>
  <script src="browser.js"></script>
  <script src="sidebar.js"></script>
  <script src="bookmarks-bar.js"></script>
  <script src="start-screen.js"></script>
</body>
</html>
